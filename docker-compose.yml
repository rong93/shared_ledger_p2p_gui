services:
  # 定義第一台機器
  client1:
    build: .
    container_name: client-1
    hostname: client1
    volumes:
      - .:/app
      - ./storage/client1:/app/storage
    ports:
      - "8001:8001"
      - "8501:8501" # Web GUI for client1
    tty: true
    stdin_open: true

  # 定義第二台機器
  client2:
    build: .
    container_name: client-2
    hostname: client2
    volumes:
      - .:/app
      - ./storage/client2:/app/storage
    ports:
      - "8002:8001"
      - "8502:8501" # Web GUI for client2
    tty: true
    stdin_open: true

  # 定義第三台機器
  client3:
    build: .
    container_name: client-3
    hostname: client3
    volumes:
      - .:/app
      - ./storage/client3:/app/storage
    ports:
      - "8003:8001"
      - "8503:8501" # Web GUI for client3
    tty: true
    stdin_open: true
 